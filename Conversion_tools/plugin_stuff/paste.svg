<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="shape">
      <!-- Body: white = opaque -->
      <rect x="40" y="64" width="152" height="172" rx="12" fill="white"/>
      <!-- Clip tab: white = opaque -->
      <rect x="88" y="32" width="80" height="52" rx="10" fill="white"/>
      <!-- Tab hole: black = cut out -->
      <rect x="100" y="42" width="56" height="30" rx="6" fill="black"/>
      <!-- Body interior: black = cut out -->
      <rect x="56" y="96" width="120" height="124" rx="6" fill="black"/>
      <!-- Text lines: white = solid black in output -->
      <rect x="72" y="124" width="88" height="11" rx="3" fill="white"/>
      <rect x="72" y="151" width="74" height="11" rx="3" fill="white"/>
      <rect x="72" y="178" width="82" height="11" rx="3" fill="white"/>
    </mask>
  </defs>
  <!-- Solid black rect, shaped by mask — transparent where mask is black -->
  <rect x="0" y="0" width="256" height="256" fill="black" mask="url(#shape)"/>
</svg>
