<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg version="1.1" width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg">
  <!-- Background 3x3 grid, thin strokes -->
  <rect x="10" y="10" width="236" height="236" rx="4"
        fill="none" stroke="#80CC28" stroke-width="7"/>
  <line x1="10"  y1="89"  x2="246" y2="89"  stroke="#80CC28" stroke-width="5"/>
  <line x1="10"  y1="167" x2="246" y2="167" stroke="#80CC28" stroke-width="5"/>
  <line x1="89"  y1="10"  x2="89"  y2="246" stroke="#80CC28" stroke-width="5"/>
  <line x1="167" y1="10"  x2="167" y2="246" stroke="#80CC28" stroke-width="5"/>
  <!-- Top arc: left→right, curving upward -->
  <path d="M 44,104 C 44,52 212,52 212,104"
        fill="none" stroke="#80CC28" stroke-width="18" stroke-linecap="butt"/>
  <!-- Arrowhead at right end, pointing downward -->
  <polygon points="212,132 191,100 233,100" fill="#80CC28"/>
  <!-- Bottom arc: right→left, curving downward -->
  <path d="M 212,152 C 212,204 44,204 44,152"
        fill="none" stroke="#80CC28" stroke-width="18" stroke-linecap="butt"/>
  <!-- Arrowhead at left end, pointing upward -->
  <polygon points="44,124 23,156 65,156" fill="#80CC28"/>
</svg>
